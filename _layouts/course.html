---
layout: default
---

<div class="container">
    <article class="course-detail">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="course-description">{{ page.description }}</p>
        {% endif %}
        
        <div class="course-content">
            {{ content }}
        </div>
    </article>
</div>
